<!DOCTYPE html>
<html lang="en" class="dark">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Crystal Mosaic - Client Login</title>
  <meta name="description" content="Log in to your Crystal Mosaic client account.">
  <script src="tailwind.js"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  
  <script>
    tailwind.config = { 
      darkMode: 'class',
      theme: {
        extend: {
          colors: {
            'lead': '#0F172A', 
            'amber': '#F59E0B',
            'light-bg': '#FFFFFF',
            'light-surface': '#F8FAFC'
          }
        }
      }
    }
  </script>

  <style>
    html, body { margin: 0; padding: 0; overflow-x: hidden; width: 100%; }

    @keyframes fadeInUp {
      from { opacity: 0; transform: translateY(30px); }
      to { opacity: 1; transform: translateY(0); }
    }
    .animate-fade-in { animation: fadeInUp 0.8s ease-out; }
  </style>
  <link rel="icon" type="image/svg+xml" href="assets/favicon.svg">
</head>
<body class="font-sans antialiased transition-colors duration-300 bg-light-bg dark:bg-lead text-black dark:text-white flex flex-col h-screen overflow-hidden w-full">

  <!-- MINIMAL FLOATING GLASS NAVBAR -->
  <div class="fixed top-4 inset-x-0 z-50 px-4 sm:px-6 lg:px-8 flex justify-center pointer-events-none">
    <nav class="w-full max-w-[1600px] bg-light-bg/80 dark:bg-lead/80 backdrop-blur-lg border border-gray-200 dark:border-amber/30 rounded-2xl lg:rounded-full shadow-2xl transition-colors duration-300 pointer-events-auto relative">
      <div class="flex justify-between items-center h-[80px] px-6 lg:px-10">

        <!-- Logo -->
        <div class="flex-shrink-0">
          <a href="index.html" class="flex items-center gap-3">
            <svg class="w-8 h-8 md:w-10 md:h-10 filter drop-shadow-[0_2px_8px_rgba(245,158,11,0.15)] flex-shrink-0" viewBox="0 0 100 100" fill="none" xmlns="http://www.w3.org/2000/svg">
              <defs>
                <linearGradient id="logo-amber" x1="0%" y1="0%" x2="100%" y2="100%">
                  <stop offset="0%" stop-color="#FBBF24" />
                  <stop offset="100%" stop-color="#F59E0B" />
                </linearGradient>
                <linearGradient id="logo-coral" x1="0%" y1="0%" x2="100%" y2="100%">
                  <stop offset="0%" stop-color="#F97316" />
                  <stop offset="100%" stop-color="#EF4444" />
                </linearGradient>
                <linearGradient id="logo-rose" x1="0%" y1="0%" x2="100%" y2="100%">
                  <stop offset="0%" stop-color="#EC4899" />
                  <stop offset="100%" stop-color="#8B5CF6" />
                </linearGradient>
                <linearGradient id="logo-blue" x1="0%" y1="0%" x2="100%" y2="100%">
                  <stop offset="0%" stop-color="#3B82F6" />
                  <stop offset="100%" stop-color="#06B6D4" />
                </linearGradient>
                <linearGradient id="logo-teal" x1="0%" y1="0%" x2="100%" y2="100%">
                  <stop offset="0%" stop-color="#0D9488" />
                  <stop offset="100%" stop-color="#10B981" />
                </linearGradient>
                <linearGradient id="logo-purple" x1="0%" y1="0%" x2="100%" y2="100%">
                  <stop offset="0%" stop-color="#8B5CF6" />
                  <stop offset="100%" stop-color="#6366F1" />
                </linearGradient>
              </defs>
              <polygon points="50,5 88,27 88,73 50,95 12,73 12,27" fill="none" stroke="#1E293B" stroke-width="3" stroke-linejoin="round" />
              <polygon points="50,5 88,27 72,38" fill="url(#logo-blue)" stroke="#1E293B" stroke-width="1.5" stroke-linejoin="round" />
              <polygon points="50,5 72,38 50,25" fill="url(#logo-teal)" stroke="#1E293B" stroke-width="1.5" stroke-linejoin="round" />
              <polygon points="88,27 88,73 72,62" fill="url(#logo-purple)" stroke="#1E293B" stroke-width="1.5" stroke-linejoin="round" />
              <polygon points="88,27 72,62 72,38" fill="url(#logo-blue)" stroke="#1E293B" stroke-width="1.5" stroke-linejoin="round" />
              <polygon points="88,73 50,95 50,75" fill="url(#logo-teal)" stroke="#1E293B" stroke-width="1.5" stroke-linejoin="round" />
              <polygon points="88,73 50,75 72,62" fill="url(#logo-purple)" stroke="#1E293B" stroke-width="1.5" stroke-linejoin="round" />
              <polygon points="50,95 12,73 28,62" fill="url(#logo-blue)" stroke="#1E293B" stroke-width="1.5" stroke-linejoin="round" />
              <polygon points="50,95 28,62 50,75" fill="url(#logo-teal)" stroke="#1E293B" stroke-width="1.5" stroke-linejoin="round" />
              <polygon points="12,73 12,27 28,38" fill="url(#logo-purple)" stroke="#1E293B" stroke-width="1.5" stroke-linejoin="round" />
              <polygon points="12,73 28,38 28,62" fill="url(#logo-blue)" stroke="#1E293B" stroke-width="1.5" stroke-linejoin="round" />
              <polygon points="12,27 50,5 50,25" fill="url(#logo-teal)" stroke="#1E293B" stroke-width="1.5" stroke-linejoin="round" />
              <polygon points="12,27 50,25 28,38" fill="url(#logo-purple)" stroke="#1E293B" stroke-width="1.5" stroke-linejoin="round" />
              <polygon points="50,50 50,25 72,38" fill="url(#logo-amber)" stroke="#1E293B" stroke-width="1.5" stroke-linejoin="round" />
              <polygon points="50,50 72,38 72,62" fill="url(#logo-coral)" stroke="#1E293B" stroke-width="1.5" stroke-linejoin="round" />
              <polygon points="50,50 72,62 50,75" fill="url(#logo-rose)" stroke="#1E293B" stroke-width="1.5" stroke-linejoin="round" />
              <polygon points="50,50 50,75 28,62" fill="url(#logo-rose)" stroke="#1E293B" stroke-width="1.5" stroke-linejoin="round" />
              <polygon points="50,50 28,62 28,38" fill="url(#logo-coral)" stroke="#1E293B" stroke-width="1.5" stroke-linejoin="round" />
              <polygon points="50,50 28,38 50,25" fill="url(#logo-amber)" stroke="#1E293B" stroke-width="1.5" stroke-linejoin="round" />
            </svg>
            <div class="flex flex-col">
              <span class="text-lg xl:text-2xl font-semibold tracking-widest text-lead dark:text-white uppercase">Crystal<span class="text-amber">Mosaic</span></span>
            </div>
          </a>
        </div>
        <!-- Toggle Buttons -->
        <div class="flex items-center gap-1.5">
          <button id="theme-toggle" class="text-lead dark:text-white hover:text-amber focus:outline-none transition duration-300 bg-gray-100 dark:bg-amber/10 p-2 rounded-full" title="Toggle Light/Dark Mode">
            <i class="fas fa-moon text-sm" id="theme-icon"></i>
          </button>
          <button id="rtl-toggle" class="text-lead dark:text-white hover:text-amber focus:outline-none transition duration-300 bg-gray-100 dark:bg-amber/10 p-2 rounded-full" title="Toggle RTL/LTR">
            <i class="fas fa-exchange-alt text-sm"></i>
          </button>
        </div>

      </div>
    </nav>
  </div>

  <!-- Main Content Area: Login Screen -->
  <main class="flex-grow flex items-center justify-center relative pt-[80px] overflow-hidden bg-light-surface dark:bg-lead transition-colors duration-300">
    
    <!-- Cathedral Glass Abstract Background -->
    <div class="absolute inset-0 bg-[url('assets/login_bg.png')] bg-cover bg-center opacity-40 dark:opacity-30 z-0"></div>
    <div class="absolute inset-0 bg-gradient-to-br from-light-bg via-light-surface/90 to-light-bg dark:from-lead dark:via-lead/95 dark:to-lead z-0 transition-colors duration-300"></div>

    <!-- Glowing Orbs -->
    <div class="absolute top-1/4 start-10 w-72 h-72 bg-amber/20 rounded-full blur-3xl animate-pulse pointer-events-none z-0"></div>
    <div class="absolute bottom-1/4 end-10 w-96 h-96 bg-blue-600/10 rounded-full blur-3xl animate-pulse pointer-events-none z-0" style="animation-delay: 1.5s;"></div>

    <div class="w-full max-w-md px-4 relative z-10">
      
      <!-- Login Card -->
      <div class="bg-light-bg dark:bg-[#1E293B] border border-gray-200 dark:border-white/10 shadow-2xl p-6 sm:p-8 animate-fade-in group rounded-[2rem] relative overflow-hidden transition-colors duration-300">
        
        <!-- Top Accent Line -->
        <div class="absolute top-0 start-0 w-full h-1.5 bg-gradient-to-r from-amber to-amber/40"></div>

        <div class="text-center mb-5">
          <h1 class="text-xl sm:text-2xl font-semibold text-black dark:text-white tracking-tight mb-1">Welcome Back.</h1>
          <p class="text-gray-500 dark:text-white/60 text-xs font-medium">Log in to view your workshop schedule or check your repair estimate.</p>
        </div>

        <form class="flex flex-col gap-4" onsubmit="handleLogin(event)">

          <div>
            <label class="block text-[9px] font-semibold uppercase tracking-widest text-gray-500 dark:text-white/70 mb-1.5">
              Email Address
            </label>
            <input 
              type="email" 
              required
              placeholder="YOUR.EMAIL@EXAMPLE.COM"
              class="w-full px-4 py-2.5 bg-gray-50 dark:bg-lead border border-gray-200 dark:border-gray-700 text-black dark:text-white text-xs font-medium focus:outline-none focus:border-amber focus:ring-1 focus:ring-amber rounded-xl transition-all"
            />
          </div>

          <div>
            <label class="block text-[9px] font-semibold uppercase tracking-widest text-gray-500 dark:text-white/70 mb-1.5">
              Password
            </label>
            <div class="relative">
              <input 
                type="password" 
                id="password"
                required
                placeholder="ENTER YOUR PASSWORD"
                class="w-full px-4 py-2.5 bg-gray-50 dark:bg-lead border border-gray-200 dark:border-gray-700 text-black dark:text-white text-xs font-medium focus:outline-none focus:border-amber focus:ring-1 focus:ring-amber rounded-xl transition-all"
              />
              <button 
                type="button" 
                onclick="togglePassword()"
                class="absolute end-4 top-1/2 -translate-y-1/2 text-gray-400 hover:text-amber transition-colors"
              >
                <i class="fas fa-eye text-sm" id="toggleIcon"></i>
              </button>
            </div>
          </div>

          <div class="flex items-center justify-between text-[10px] sm:text-xs pt-1">
            <label class="flex items-center cursor-pointer group-checkbox">
              <input type="checkbox" class="w-3.5 h-3.5 rounded border-gray-300 dark:border-gray-600 text-amber focus:ring-amber bg-white dark:bg-lead">
              <span class="ms-2 text-gray-500 dark:text-white/60 font-medium uppercase tracking-widest">Remember me</span>
            </label>
            <span class="text-amber font-semibold uppercase tracking-widest cursor-pointer hover:text-black dark:hover:text-white transition-colors">
              Forgot password?
            </span>
          </div>

          <button 
            type="submit"
            class="w-full py-3.5 mt-2 bg-amber text-black hover:bg-lead hover:text-white dark:hover:bg-white dark:hover:text-black font-semibold uppercase tracking-widest text-xs transition-colors duration-300 rounded-full shadow-lg shadow-amber/20 flex items-center justify-center gap-2"
          >
            <span>Sign In</span>
            <i class="fas fa-arrow-right text-[10px] rtl:rotate-180"></i>
          </button>

          <div class="relative my-3.5">
            <div class="absolute inset-0 flex items-center">
              <div class="w-full border-t border-gray-200 dark:border-white/10"></div>
            </div>
            <div class="relative flex justify-center text-[9px] uppercase tracking-widest font-semibold">
              <span class="px-3 bg-light-bg dark:bg-[#1E293B] text-gray-400 dark:text-white/50">Or Continue With</span>
            </div>
          </div>

          <div class="grid grid-cols-2 gap-3">
            <button 
              type="button"
              class="flex items-center justify-center w-full px-4 py-2.5 border border-gray-200 dark:border-white/10 hover:border-amber dark:hover:border-amber transition-colors bg-white dark:bg-lead rounded-full gap-2.5 shadow-sm"
            >
              <svg class="w-3.5 h-3.5" viewBox="0 0 24 24">
                <path fill="#4285F4" d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z"/>
                <path fill="#34A853" d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"/>
                <path fill="#FBBC05" d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z"/>
                <path fill="#EA4335" d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z"/>
              </svg>
              <span class="text-[9px] font-semibold uppercase tracking-widest text-black dark:text-white">Google</span>
            </button>

            <button 
              type="button"
              class="flex items-center justify-center w-full px-4 py-2.5 border border-gray-200 dark:border-white/10 hover:border-amber dark:hover:border-amber transition-colors bg-white dark:bg-lead rounded-full gap-2.5 shadow-sm"
            >
              <i class="fab fa-apple text-sm text-black dark:text-white"></i>
              <span class="text-[9px] font-semibold uppercase tracking-widest text-black dark:text-white">Apple</span>
            </button>
          </div>

        </form>

        <div class="mt-6 text-center text-[10px] sm:text-xs font-medium uppercase tracking-widest text-gray-500 dark:text-white/60">
          Need an account? 
          <a href="register.html" class="text-amber hover:text-black dark:hover:text-white transition-colors ms-1 font-semibold">
            Register Here
          </a>
        </div>

      </div>
    </div>
  </main>

  <script>
    // --- Password Visibility Toggle ---
    function togglePassword() {
        const passwordInput = document.getElementById('password');
        const toggleIcon = document.getElementById('toggleIcon');

        if (passwordInput.type === 'password') {
            passwordInput.type = 'text';
            toggleIcon.classList.remove('fa-eye');
            toggleIcon.classList.add('fa-eye-slash');
        } else {
            passwordInput.type = 'password';
            toggleIcon.classList.remove('fa-eye-slash');
            toggleIcon.classList.add('fa-eye');
        }
    }

    // --- Handle Login Submission ---
    function handleLogin(event) {
        event.preventDefault();

        const button = event.target.querySelector('button[type="submit"]');
        const icon = button.querySelector('i');
        const span = button.querySelector('span');
        
        icon.className = 'fas fa-spinner fa-spin';
        span.innerText = 'AUTHENTICATING...';
        button.disabled = true;
        button.classList.add('opacity-50', 'cursor-not-allowed');

        setTimeout(() => {
            window.location.href = 'client-dashboard.html';
        }, 1500);
    }

  </script>
  <script>
    // ===== Theme Toggle (Dark/Light) =====
    (function() {
      const html = document.documentElement;
      const savedTheme = localStorage.getItem('theme');
      if (savedTheme === 'light') { html.classList.remove('dark'); }
      else { html.classList.add('dark'); }

      function updateThemeIcons() {
        const isDark = html.classList.contains('dark');
        const themeIcon = document.getElementById('theme-icon');
        if (themeIcon) themeIcon.className = isDark ? 'fas fa-sun text-sm' : 'fas fa-moon text-sm';
        const mobileThemeIcon = document.getElementById('mobile-theme-icon');
        const mobileThemeText = document.getElementById('mobile-theme-text');
        if (mobileThemeIcon) mobileThemeIcon.className = isDark ? 'fas fa-sun text-sm' : 'fas fa-moon text-sm';
        if (mobileThemeText) mobileThemeText.textContent = isDark ? 'Light Mode' : 'Dark Mode';
      }

      function toggleTheme() {
        html.classList.toggle('dark');
        localStorage.setItem('theme', html.classList.contains('dark') ? 'dark' : 'light');
        updateThemeIcons();
      }

      const themeToggle = document.getElementById('theme-toggle');
      if (themeToggle) themeToggle.addEventListener('click', toggleTheme);
      const mobileThemeToggle = document.getElementById('mobile-theme-toggle');
      if (mobileThemeToggle) mobileThemeToggle.addEventListener('click', toggleTheme);
      updateThemeIcons();
    })();

    // ===== RTL Toggle =====
    (function() {
      const html = document.documentElement;
      const savedDir = localStorage.getItem('dir');
      if (savedDir === 'rtl') html.setAttribute('dir', 'rtl');

      function toggleRTL() {
        const isRTL = html.getAttribute('dir') === 'rtl';
        if (isRTL) { html.removeAttribute('dir'); localStorage.setItem('dir', 'ltr'); }
        else { html.setAttribute('dir', 'rtl'); localStorage.setItem('dir', 'rtl'); }
      }

      const rtlToggle = document.getElementById('rtl-toggle');
      if (rtlToggle) rtlToggle.addEventListener('click', toggleRTL);
      const mobileRtlToggle = document.getElementById('mobile-rtl-toggle');
      if (mobileRtlToggle) mobileRtlToggle.addEventListener('click', toggleRTL);
    })();
  </script>
</body>
</html>
