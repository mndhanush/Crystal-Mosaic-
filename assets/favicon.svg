<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" width="100" height="100">
  <!-- Outer Lead Border -->
  <polygon points="50,5 95,50 50,95 5,50" fill="none" stroke="#0F172A" stroke-width="5" stroke-linejoin="round"/>
  
  <!-- Stained Glass Segments -->
  <polygon points="50,5 50,50 95,50" fill="#F59E0B" /> <!-- Amber Top Right -->
  <polygon points="95,50 50,50 50,95" fill="#3B82F6" /> <!-- Blue Bottom Right -->
  <polygon points="50,95 50,50 5,50" fill="#EF4444" /> <!-- Ruby Bottom Left -->
  <polygon points="5,50 50,50 50,5" fill="#10B981" /> <!-- Emerald Top Left -->
  
  <!-- Inner Lead Came lines -->
  <line x1="5" y1="50" x2="95" y2="50" stroke="#0F172A" stroke-width="4"/>
  <line x1="50" y1="5" x2="50" y2="95" stroke="#0F172A" stroke-width="4"/>
  
  <!-- Central Diamond Core -->
  <polygon points="50,30 70,50 50,70 30,50" fill="none" stroke="#FFFFFF" stroke-width="2" opacity="0.6"/>
</svg>
